name: Build And Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ccr.ccs.tencentyun.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: chmod +x ./mvnw && ./mvnw -B test

      - name: Log in to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/book-mall-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
        run: |
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST is empty"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "DEPLOY_USER is empty"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "DEPLOY_SSH_KEY is empty"; exit 1; }
          test -n "$TCR_USERNAME" || { echo "TCR_USERNAME is empty"; exit 1; }
          test -n "$TCR_PASSWORD" || { echo "TCR_PASSWORD is empty"; exit 1; }
          test -n "$TCR_NAMESPACE" || { echo "TCR_NAMESPACE is empty"; exit 1; }

      - name: Write SSH key
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          DEPLOY_HOST="$(echo "$DEPLOY_HOST" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          DEPLOY_PORT="$(echo "${DEPLOY_PORT:-22}" | tr -d '\r[:space:]')"

          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.DEPLOY_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh-keygen -R "$DEPLOY_HOST" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true
          ssh-keygen -R "[$DEPLOY_HOST]:$DEPLOY_PORT" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true

          if [ -n "$DEPLOY_HOST_KEY" ]; then
            printf '%s\n' "$DEPLOY_HOST_KEY" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Test SSH connection
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          DEPLOY_HOST="$(echo "$DEPLOY_HOST" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          DEPLOY_PORT="$(echo "${DEPLOY_PORT:-22}" | tr -d '\r[:space:]')"
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=10"

          ssh $SSH_OPTS -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "echo SSH login succeeded"

      - name: Sync deployment files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          DEPLOY_HOST="$(echo "$DEPLOY_HOST" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          DEPLOY_PORT="$(echo "${DEPLOY_PORT:-22}" | tr -d '\r[:space:]')"
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=10"

          ssh $SSH_OPTS -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p /opt/book-mall/scripts"
          scp $SSH_OPTS -P "${DEPLOY_PORT}" deploy/docker-compose.prod.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/book-mall/docker-compose.prod.yml"
          scp $SSH_OPTS -P "${DEPLOY_PORT}" scripts/deploy-prod.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/book-mall/scripts/deploy-prod.sh"

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          DEPLOY_HOST="$(echo "$DEPLOY_HOST" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          DEPLOY_PORT="$(echo "${DEPLOY_PORT:-22}" | tr -d '\r[:space:]')"
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=10"

          ssh $SSH_OPTS -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd /opt/book-mall && chmod +x scripts/deploy-prod.sh && APP_DIR=/opt/book-mall ./scripts/deploy-prod.sh"
