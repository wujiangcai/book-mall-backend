services:
  book-mall-backend:
    image: ${IMAGE_NAME}
    container_name: book-mall-backend
    restart: unless-stopped
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_CONFIG_DIR: /app/config
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL}
      ALIPAY_FRONTEND_BASE_URL: ${ALIPAY_FRONTEND_BASE_URL}
      ALIPAY_SELLER_ID: ${ALIPAY_SELLER_ID}
    volumes:
      - /opt/book-mall/config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8003/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
