spring.application.name=book-mall-backend
server.port=8003
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/book_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=top.wjc.bookmallbackend.entity
mybatis.configuration.map-underscore-to-camel-case=true
# mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# Logging
logging.level.top.wjc.bookmallbackend=INFO
logging.level.org.springframework.web=INFO
logging.level.top.wjc.bookmallbackend.mapper=INFO

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
logging.level.org.springdoc=DEBUG

# External secrets loaded from APP_CONFIG_DIR or the local ./config directory
spring.config.import=optional:file:${APP_CONFIG_DIR:./config}/alipay.yml,optional:file:${APP_CONFIG_DIR:./config}/cos.yml

# Alipay non-secret defaults
alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=${ALIPAY_NOTIFY_URL:}
alipay.return-url=${ALIPAY_RETURN_URL:}
alipay.frontend-base-url=${ALIPAY_FRONTEND_BASE_URL:}
alipay.seller-id=${ALIPAY_SELLER_ID:}
alipay.charset=UTF-8
alipay.sign-type=RSA2
alipay.format=json

# COS defaults, safe to override via env or external config
cos.secret-id=${COS_SECRET_ID:}
cos.secret-key=${COS_SECRET_KEY:}
cos.region=${COS_REGION:}
cos.bucket=${COS_BUCKET:}
cos.base-url=${COS_BASE_URL:}
cos.sign-duration-seconds=${COS_SIGN_DURATION_SECONDS:604800}
