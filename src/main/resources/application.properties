spring.application.name=book-mall-backend
server.port=8003

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/book_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cwj040812}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=top.wjc.bookmallbackend.entity
mybatis.configuration.map-underscore-to-camel-case=true
# mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT 配置
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# 跨域配置
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://101.35.245.13:5173,http://101.35.245.13:3000

# 日志配置
logging.level.top.wjc.bookmallbackend=INFO
logging.level.org.springframework.web=INFO
logging.level.top.wjc.bookmallbackend.mapper=INFO

# Swagger 配置
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
logging.level.org.springdoc=DEBUG

# 外部密钥配置（不进仓库）
# 读取 C:/Users/caiwujiang/Desktop/alipay.yml
# 读取 C:/Users/caiwujiang/Desktop/cos.yml
#spring.config.import=optional:file:C:/Users/caiwujiang/Desktop/alipay.yml,optional:file:C:/Users/caiwujiang/Desktop/cos.yml
spring.config.import=optional:file:/home/ubuntu/project/alipay.yml
# 支付宝沙箱配置（非敏感项可保留在此文件）
alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=http://localhost:8003/api/front/pay/alipay/notify
alipay.return-url=http://localhost:8003/api/front/pay/alipay/return
alipay.frontend-base-url=http://localhost:5173
alipay.seller-id=
alipay.charset=UTF-8
alipay.sign-type=RSA2
alipay.format=json

# COS 配置（敏感项建议放外部文件）
cos.region=
cos.bucket=
cos.base-url=
